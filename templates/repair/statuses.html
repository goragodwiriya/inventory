<aside data-component="sidebar"></aside>
<div class="main-content">
    <form data-form="repairStatuses" action="api/repair/statuses/save" method="post" data-ajax-submit="true" data-load-api="api/repair/statuses/get" data-load-query-params="true"
          data-confirm="Confirm save">
        <header data-component="topbar"></header>
        <main class="content">
            <div class="card-groups">
                <header>
                    <div>
                        <h1 class="icon-tags" data-text="title || type" data-i18n>{LNG_Repair status}</h1>
                        <p data-i18n>Manage the repair workflow statuses</p>
                    </div>
                </header>
                <div class="content-body">
                    <fieldset class="grid">
                        <div class="tablebody">
                            <table class="table border fullwidth" data-table="repairStatuses" data-editable-rows="true" data-attr="data:options" data-dynamic-columns="true">
                                <tbody></tbody>
                            </table>
                        </div>
                    </fieldset>
                    <fieldset class="submit">
                        <button type="submit" class="btn btn-primary icon-save" data-i18n>{LNG_Save}</button>
                        <input type="hidden" name="type" data-attr="value:type">
                    </fieldset>
                </div>
            </div>
        </main>
    </form>
</div>
