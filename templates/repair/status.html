<form data-form="repairStatus" data-validate="false" data-reset="false" action="api/repair/status/save" method="post" data-ajax-submit="true" autocomplete="off">
    <fieldset>
        <legend data-i18n>{LNG_Repair job description}</legend>
        <div class="form-group">
            <div class="width50">
                <label for="job_id" data-i18n>{LNG_Job No.}</label>
                <span class="form-control icon-number">
                    <input type="text" id="job_id" data-attr="value:job_id" disabled>
                </span>
            </div>
            <div class="width50">
                <label for="product_no" data-i18n>{LNG_Serial}/{LNG_Registration No}</label>
                <span class="form-control icon-barcode">
                    <input type="text" id="product_no" data-attr="value:product_no" disabled>
                </span>
            </div>
        </div>
        <div class="form-group">
            <div class="width50">
                <label for="topic" data-i18n>{LNG_Equipment}</label>
                <span class="form-control icon-product">
                    <input type="text" id="topic" data-attr="value:topic" disabled>
                </span>
            </div>
            <div class="width50">
                <label for="customer_name" data-i18n>{LNG_Informer}</label>
                <span class="form-control icon-profile">
                    <input type="text" id="customer_name" data-attr="value:customer_name" disabled>
                </span>
            </div>
        </div>
        <div class="form-group">
            <div class="width50">
                <label for="created_at_text" data-i18n>{LNG_Created}</label>
                <span class="form-control icon-calendar">
                    <input type="text" id="created_at_text" data-attr="value:created_at_text" disabled>
                </span>
            </div>
            <div class="width50">
                <label for="appointment_date_text" data-i18n>{LNG_Appointment}</label>
                <span class="form-control icon-calendar">
                    <input type="text" id="appointment_date_text" data-attr="value:appointment_date_text" disabled>
                </span>
            </div>
        </div>
        <div>
            <label for="job_description" data-i18n>{LNG_Problems and repairs details}</label>
            <span class="form-control icon-file">
                <textarea id="job_description" rows="4" data-text="job_description" disabled></textarea>
            </span>
        </div>
        <div>
            <label data-i18n>{LNG_Transaction history}</label>
            <div class="tablebody">
                <table class="table border fullwidth" data-table="repairStatusHistory" data-attr="data:history_rows" data-show-caption="false">
                    <thead>
                        <tr>
                            <th data-field="created_at" data-format="datetime" class="center" data-cell-class="center" data-i18n>{LNG_Created}</th>
                            <th data-field="status_text" data-i18n>{LNG_Repair status}</th>
                            <th data-field="operator_name" data-i18n>{LNG_Operator}</th>
                            <th data-field="member_name" data-i18n>{LNG_User}</th>
                            <th data-field="cost_text" class="center" data-cell-class="center" data-i18n>{LNG_Actual cost}</th>
                            <th data-field="comment_text" data-template="<span class='two_line'>${comment_text}</span>" data-i18n>{LNG_Comment}</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </fieldset>
    <fieldset data-attr="disabled:!can_submit">
        <legend data-i18n>{LNG_Repair status}</legend>
        <div class="form-group">
            <div class="width50">
                <label for="status" data-i18n>{LNG_Repair status}</label>
                <span class="form-control icon-valid">
                    <select id="status" name="status" data-options-key="status" data-attr="value:status">
                        <option value="" data-i18n>{LNG_Please select}</option>
                    </select>
                </span>
            </div>
            <div class="width50">
                <label for="operator_id" data-i18n>{LNG_Operator}</label>
                <span class="form-control icon-user">
                    <select id="operator_id" name="operator_id" data-options-key="operator_id" data-attr="value:operator_id,disabled:!can_manage_repair"></select>
                </span>
            </div>
        </div>
        <div class="form-group">
            <div class="width50">
                <label for="cost" data-i18n>{LNG_Actual cost}</label>
                <span class="form-control icon-money">
                    <input type="number" id="cost" name="cost" min="0" step="0.01" data-attr="value:cost">
                </span>
            </div>
            <div class="width50">
                <label for="current_status_text" data-i18n>{LNG_Current status}</label>
                <span class="form-control icon-flag">
                    <input type="text" id="current_status_text" data-attr="value:current_status_text" disabled>
                </span>
            </div>
        </div>
        <div>
            <label for="comment" data-i18n>{LNG_Comment}</label>
            <span class="form-control icon-comments">
                <textarea id="comment" name="comment" rows="4" data-text="comment"></textarea>
            </span>
        </div>
        <aside class="warning" data-if="!can_submit" data-i18n>You can view this repair request but you cannot update its status</aside>
    </fieldset>
    <fieldset class="submit right">
        <button type="submit" class="btn btn-primary icon-save" data-if="can_submit" data-i18n>{LNG_Save}</button>
        <input type="hidden" name="id" data-attr="value:id">
    </fieldset>
</form>
