<aside data-component="sidebar"></aside>
<div class="main-content">
  <div>
    <header data-component="topbar"></header>
    <main class="content">
      <form data-form="inventoryAssetEdit" data-validate="false" data-reset="false" action="api/inventory/asset/save" method="post" data-ajax-submit="true"
            data-load-api="api/inventory/asset/get" data-load-query-params="true" autocomplete="off">
        <div class="card-groups">
          <header>
            <div>
              <h1 class="icon-product" data-i18n>{LNG_Details of} {LNG_Equipment}</h1>
              <p data-text="topic"></p>
            </div>
            <div class="header-actions">
              <a class="btn btn-secondary icon-arrow-left" href="/inventory-assets" data-i18n>{LNG_Back to List}</a>
              <a class="btn btn-info icon-list" data-attr="href:'/inventory-items?id=' + id" data-i18n>Items</a>
            </div>
          </header>
          <div class="content-body">
            <fieldset>
              <div>
                <label for="topic" data-i18n>Equipment</label>
                <span class="form-control icon-product">
                  <input type="text" id="topic" name="topic" data-attr="value:topic" maxlength="150">
                </span>
              </div>
              <div class="form-group">
                <div class="width50">
                  <label for="category_id" data-i18n>Category</label>
                  <span class="form-control icon-tags">
                    <select id="category_id" name="category_id" data-options-key="category_id" data-attr="value:category_id">
                      <option value="" data-i18n>Please select</option>
                    </select>
                  </span>
                </div>
                <div class="width50">
                  <label for="type_id" data-i18n>Type</label>
                  <span class="form-control icon-list">
                    <select id="type_id" name="type_id" data-options-key="type_id" data-attr="value:type_id">
                      <option value="" data-i18n>Please select</option>
                    </select>
                  </span>
                </div>
              </div>
              <div class="form-group">
                <div class="width50">
                  <label for="model_id" data-i18n>Brand</label>
                  <span class="form-control icon-office">
                    <select id="model_id" name="model_id" data-options-key="model_id" data-attr="value:model_id">
                      <option value="" data-i18n>Please select</option>
                    </select>
                  </span>
                </div>
              </div>
              <div>
                <label for="detail" data-i18n>{LNG_Details}</label>
                <span class="form-control icon-file">
                  <textarea id="detail" name="detail" rows="4" data-attr="value:detail"></textarea>
                </span>
              </div>
              <div>
                <label for="inventory" data-i18n>{LNG_Images}</label>
                <span class="form-control icon-upload">
                  <input type="file" id="inventory" name="inventory" data-files="inventory" multiple data-preview="true" data-allow-remove-existing="true"
                         data-action-url="api/inventory/asset/remove-image" accept="image/*">
                </span>
                <div class="comment" id="result_inventory" data-i18n>{LNG_Browse image uploaded, type} jpg, jpeg, png, webp</div>
              </div>
              <div>
                <input type="checkbox" class="switch" id="inuse" name="inuse" value="1" data-attr="checked:inuse">
                <label for="inuse" data-i18n>{LNG_Active}</label>
              </div>
            </fieldset>
            <fieldset class="submit">
              <button type="submit" class="btn btn-primary icon-save" data-i18n>Save</button>
              <input type="hidden" name="id" data-attr="value:id">
            </fieldset>
          </div>
        </div>
      </form>
    </main>
  </div>
  <footer class="footer">
    <p class="center">&copy; 2026 Admin Framework - Powered by <a href="https://nowjs.net">Now.js</a></p>
  </footer>
</div>
