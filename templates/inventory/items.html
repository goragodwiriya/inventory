<aside data-component="sidebar"></aside>
<div class="main-content">
    <div>
        <header data-component="topbar"></header>
        <main class="content">
            <form data-form="inventoryItemsEdit" action="api/inventory/items/save" method="post" data-ajax-submit="true" data-load-api="api/inventory/items/get"
                  data-load-query-params="true" data-confirm="Confirm save">
                <div class="card-groups">
                    <header>
                        <div>
                            <h1 class="icon-list" data-i18n>Items</h1>
                            <p data-text="topic"></p>
                        </div>
                        <div class="header-actions">
                            <a class="btn btn-secondary icon-arrow-left" data-attr="href:'/inventory-asset?id=' + id" data-i18n>{LNG_Details of} {LNG_Equipment}</a>
                            <a class="btn btn-secondary icon-product" href="/inventory-assets" data-i18n>Inventory</a>
                        </div>
                    </header>
                    <div class="content-body">
                        <fieldset>
                            <div>
                                <label data-i18n>{LNG_Equipment}</label>
                                <span class="form-control icon-product">
                                    <input type="text" data-attr="value:topic" disabled>
                                </span>
                            </div>
                        </fieldset>
                        <fieldset class="grid">
                            <div class="tablebody">
                                <table class="table border fullwidth" data-table="inventoryItems" data-editable-rows="true" data-attr="data:item_rows">
                                    <thead>
                                        <tr>
                                            <th data-field="product_no" data-cell-element="text" data-i18n>{LNG_Serial}/{LNG_Registration No}</th>
                                            <th data-field="stock" class="center" data-cell-class="center" data-cell-element="number" data-i18n>{LNG_Stock}</th>
                                            <th data-field="unit" class="center" data-cell-class="center" data-cell-element="select" data-options-key="unit" data-i18n>Unit</th>
                                        </tr>
                                    </thead>
                                    <tbody></tbody>
                                </table>
                            </div>
                        </fieldset>
                        <fieldset class="submit">
                            <button type="submit" class="btn btn-primary icon-save" data-i18n>Save</button>
                            <input type="hidden" name="id" data-attr="value:id">
                        </fieldset>
                    </div>
                </div>
            </form>
        </main>
    </div>
    <footer class="footer">
        <p class="center">&copy; 2026 Admin Framework - Powered by <a href="https://nowjs.net">Now.js</a></p>
    </footer>
</div>
